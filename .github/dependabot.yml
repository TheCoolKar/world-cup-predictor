version: 2
updates:
  # npm dependencies (Vite, React, Supabase SDK, etc.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Bundle minor/patch bumps into one PR to cut noise; majors stay separate.
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies"]

  # GitHub Actions versions (actions/checkout, setup-node, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]
